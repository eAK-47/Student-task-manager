<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Task Manager</title>

<style>

body{
font-family:Inter,sans-serif;
background:#f4f7fb;
margin:0;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
color:#111827;
margin-bottom:25px;
}

.task-form{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0px 5px 15px rgba(0,0,0,0.1);

display:grid;
grid-template-columns:2fr 1fr 1fr auto;
gap:15px;

margin-bottom:30px;
}

input,select{

padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;

}

button{

padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;

}

.add-btn{

background:#111827;
color:white;
}

.task-list{

display:flex;
flex-direction:column;
gap:15px;

}

.task{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0px 5px 15px rgba(0,0,0,0.1);

display:flex;
justify-content:space-between;
align-items:center;
}

.task-left h3{

margin-bottom:10px;
color:#111827;
}

.details{

display:flex;
gap:15px;
font-size:14px;
color:gray;
}

.priority{

padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.high{

background:#fee2e2;
color:red;
}

.medium{

background:#fef3c7;
color:#d97706;
}

.low{

background:#d1fae5;
color:green;
}

.delete{

background:red;
color:white;
}

.exit{

margin-top:50px;
display:flex;
justify-content:center;
}

.exit button{

background:#ef4444;
color:white;
width:200px;
}

.exit button:hover{

opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>📋 Student Tasks</h1>

<div class="task-form">

<input
type="text"
id="taskInput"
placeholder="Enter task">

<select id="priority">

<option>High</option>
<option>Medium</option>
<option>Low</option>

</select>

<input
type="date"
id="date">

<button
class="add-btn"
onclick="addTask()">

Add Task

</button>

</div>

<div
class="task-list"
id="taskList">

</div>

<div class="exit">

<button onclick="goBack()">

← Exit to Dashboard

</button>

</div>

</div>

<script>

function addTask(){

let task=
document.getElementById("taskInput").value;

let priority=
document.getElementById("priority").value;

let date=
document.getElementById("date").value;

if(task==""){

alert("Enter task");

return;

}

let colorClass=
priority.toLowerCase();

let div=
document.createElement("div");

div.className="task";

div.innerHTML=`

<div class="task-left">

<h3>${task}</h3>

<div class="details">

<span class="priority ${colorClass}">
${priority}
</span>

<span>
📅 ${date}
</span>

<span>
Status: Pending
</span>

</div>

</div>

<button
class="delete"
onclick="this.parentElement.remove()">

Delete

</button>

`;

document
.getElementById("taskList")
.appendChild(div);

document
.getElementById("taskInput")
.value="";

}

function goBack(){

window.location="Dashboard.html";

}

</script>

</body>

</html>
