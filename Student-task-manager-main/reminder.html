<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Notifications</title>

<style>

body{
font-family:Inter,sans-serif;
background:#f4f7fb;
margin:0;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
color:#111827;
margin-bottom:10px;
}

.subtitle{
color:gray;
margin-bottom:30px;
}

.notification-list{
display:flex;
flex-direction:column;
gap:20px;
}

.notification{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0px 5px 15px rgba(0,0,0,.1);

display:flex;
justify-content:space-between;
align-items:center;
}

.notification:hover{

transform:translateY(-3px);
transition:.3s;
}

.left{

display:flex;
gap:15px;
align-items:center;
}

.icon{

font-size:28px;
}

.message h3{

margin-bottom:8px;
color:#111827;
}

.message p{

color:gray;
font-size:14px;
}

.high{

border-left:6px solid red;
}

.medium{

border-left:6px solid orange;
}

.low{

border-left:6px solid green;
}

.time{

font-size:13px;
color:#6b7280;
}

.exit{

margin-top:40px;
display:flex;
justify-content:center;
}

.exit button{

padding:12px 25px;
border:none;
border-radius:10px;
background:#ef4444;
color:white;
cursor:pointer;
font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔔 Notifications</h1>

<p class="subtitle">
Upcoming task reminders and deadlines
</p>

<div class="notification-list">

<div class="notification high">

<div class="left">

<div class="icon">
⚠️
</div>

<div class="message">

<h3>Java Assignment Due Soon</h3>

<p>
Complete your Java OOP assignment before tomorrow.
</p>

</div>

</div>

<div class="time">
1 hour ago
</div>

</div>


<div class="notification medium">

<div class="left">

<div class="icon">
📚
</div>

<div class="message">

<h3>Database Quiz Reminder</h3>

<p>
Database quiz scheduled in 2 days.
</p>

</div>

</div>

<div class="time">
Today
</div>

</div>


<div class="notification low">

<div class="left">

<div class="icon">
📝
</div>

<div class="message">

<h3>Mini Project Review</h3>

<p>
Prepare documents for project review.
</p>

</div>

</div>

<div class="time">
Tomorrow
</div>

</div>

</div>

<div class="exit">

<button onclick="goBack()">
← Exit to Dashboard
</button>

</div>

</div>

<script>

function goBack(){

window.location="Dashboard.html";

}

</script>

</body>

</html>
