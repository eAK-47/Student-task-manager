<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<style>

body{
font-family:Inter,sans-serif;
background:#f4f7fb;
margin:0;
padding:40px 30px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
color:#111827;
text-align:center;
margin-bottom:50px;
font-size:32px;
}

.dashboard-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
padding:40px 20px;
border-radius:15px;
box-shadow:0px 5px 15px rgba(0,0,0,.1);
text-align:center;
text-decoration:none;
color:#111827;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:transform .3s ease, box-shadow .3s ease;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0px 10px 25px rgba(0,0,0,.15);
}

.icon{
font-size:45px;
margin-bottom:20px;
}

.card h3{
margin:0;
font-size:20px;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<h1>🎓 Main Dashboard</h1>

<div class="dashboard-grid">

<a href="profile.html" class="card">
<div class="icon">👤</div>
<h3>Profile</h3>
</a>

<a href="task.html" class="card">
<div class="icon">📋</div>
<h3>Tasks</h3>
</a>

<a href="schedule.html" class="card">
<div class="icon">📅</div>
<h3>Schedule</h3>
</a>

<a href="notifications.html" class="card">
<div class="icon">🔔</div>
<h3>Notifications</h3>
</a>

<a href="Progress.html" class="card">
<div class="icon">📊</div>
<h3>Progress</h3>
</a>

</div>

</div>

</body>

</html>
