<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Task Manager Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to right,#0b1d3a,#001f3f,#0b1d3a);
}

.container{
width:430px;
background:white;
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0px 10px 30px rgba(0,0,0,0.3);
}

.logo{
font-size:40px;
margin-bottom:15px;
}

h1{
color:#102542;
margin-bottom:10px;
}

.subtitle{
color:gray;
margin-bottom:30px;
}

.input-box{
margin:15px 0;
}

input{
width:100%;
padding:15px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
background:#f5f5f5;
}

input:focus{
outline:none;
border:1px solid #001f3f;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
font-size:18px;
background:#001f3f;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#003366;
}

.links{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:14px;
}

.links a{
text-decoration:none;
color:#555;
}

.links a:hover{
color:#001f3f;
}

.error{
margin-top:10px;
color:red;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">📚</div>

<h1>Student Login</h1>

<p class="subtitle">
Login to access your Student Task Manager
</p>

<form id="loginForm">

<div class="input-box">
<input type="email"
id="email"
placeholder="Email ID"
required>
</div>

<div class="input-box">
<input type="password"
id="password"
placeholder="Password"
required>
</div>

<button type="submit">
Login →
</button>

<p class="error" id="error"></p>

<div class="links">
<a href="#">Forgot Password?</a>
<a href="#">Sign Up</a>
</div>

</form>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

let email=
document.getElementById("email").value;

let password=
document.getElementById("password").value;

if(email==="" || password===""){
document.getElementById("error")
.innerText="Please fill all fields";
}
else{

else {
    alert("Login Successful");
    // Redirect cleanly to the task creation dashboard
    window.location.href = "task.html";


}

});

</script>

</body>
</html>
