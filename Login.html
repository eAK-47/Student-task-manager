<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Manager</title>
    <link rel="stylesheet" href="Style.css">
    <script src="JavaScript/Script.js"></script>
</head>
<body>
    <h2>Welcome USER</h2>
    <div class="card fade-in">
        <h2>Student Login</h2>
        <div class="input-group">
            <label for="student-name">Enter Name</label>
            <input type="text" id="student-name" placeholder="Name Here" required>
        </div>
        <div class="input-group" style="margin-top: 8px;">
            <label for="password">Enter Password</label>
            <input type="text" id="student-id" placeholder="Enter Password"required>
        </div>
        <div style="width: 100%; text-align: right; margin-bottom: 16px;">
            <a href="mailto:support@studenttaskmanager.com?subject=Forgot%20Student%20ID" class="forgot-link">Forgot Student ID?</a>
        </div>
        <button type="button">Continue</button>
        <a href="About.html" class="info-link">What is Student Task Manager?</a>
    </div>
</body>
</html>
